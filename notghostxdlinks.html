<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="https://i.ibb.co/ZBq1nVg/image-2024-08-05-223202036.png">
    <title>Notghostxd - Links</title>
    
</head>
<body>
    <div class="container">
        <h1>NotGhostXD</h1>
        <p id="subtext">Hi, welcome to ghost links! Feel free to follow my TikTok :)</p>
        <p>• My links •</p>
        <div class="btn-container">
            <a class="btn" href="https://www.youtube.com/@notghostxd" target="_blank">YouTube</a>
            <a class="btn" href="https://discord.com/invite/BjZcmDTAZb" target="_blank">Discord Server</a>
            <a class="btn" href="https://www.tiktok.com/@notghostxd_yt" target="_blank">TikTok</a>
            <a class="btn" href="https://www.roblox.com/groups/34510534/Ghost-Studios#!/about" target="_blank">Group</a>
            <a class="btn" href="https://www.roblox.com/users/2930656024/profile" target="_blank">Roblox User</a>
        </div>
        <a class="ad" href="https://anoxle.github.io/vulpes/" target="_blank">
            Vulpes - Better Discord-Wide Commands!
        </a>
        <div class="footer">
            <p>Made by <a href="https://www.youtube.com/@luxpog" target="_blank">luxpog 💖</a></p>
        </div>
    </div>
    <script>
        function isPrideMonth() {
            return new Date().getMonth() === 5;
        }
        window.addEventListener('load', () => {
            const subtext = document.getElementById('subtext');
            if (isPrideMonth()) {
                subtext.innerHTML = 'Happy <span class="rainbow-text">pride</span> month!';
            }
        });
    </script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #a8e0ff, #ff9a9e);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            color: #333;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .container {
            background: rgba(255, 255, 255, .8);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, .1);
            text-align: center;
            max-width: 90%;
            width: 400px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp .8s ease forwards;
        }
        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }
        h1, p {
            opacity: 0;
            animation: fadeIn .8s ease forwards;
            animation-delay: .3s;
        }
        .btn-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }
        .btn {
            flex: 1 1 calc(50% - 10px);
            padding: 10px;
            border: none;
            border-radius: 5px;
            background: linear-gradient(135deg, #ff6f61, #ff4f3d);
            color: #fff;
            text-decoration: none;
            font-weight: 700;
            transition: transform .3s, background-color .3s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, .2);
            opacity: 0;
            animation: fadeInScale .5s ease forwards;
        }
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .btn:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, #ff4f3d, #ff6f61);
        }
        .footer {
            margin-top: 20px;
            font-size: 14px;
            opacity: 0;
            animation: fadeIn .8s ease forwards;
            animation-delay: 1.5s;
        }
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        .footer a {
            color: #4a90e2;
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
        }
        .rainbow-text {
            font-size: 1.2em;
            font-weight: bold;
            background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3);
            background-size: 700% 700%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: rainbow 5s linear infinite;
        }
        @keyframes rainbow {
            0% { background-position: 0%; }
            100% { background-position: 100%; }
        }
        .ad {
            margin-top: 20px;
            padding: 10px;
            background: linear-gradient(135deg, #4a90e2, #45b6fe);
            border-radius: 5px;
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            display: block;
            transition: transform .3s, background-color .3s;
        }
        .ad:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, #45b6fe, #4a90e2);
        }
    </style>
    
</body>
</html>
