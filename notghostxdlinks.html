<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="notghostxd's personal links page">
<link rel="icon" type="image/png" href="https://icons.veryicon.com/png/o/miscellaneous/simple-icon/link-66.png">
<title>notghostxd - Links</title>
<style>
body{background:linear-gradient(to bottom right,#2a2a3a,#1f1f29);min-height:100vh;display:flex;align-items:center;justify-content:center;color:white;padding:16px}
.container{max-width:400px;width:100%;background-color:rgba(31,31,41,0.8);border-radius:20px;padding:32px;text-align:center}
h1{text-align:center;font-size:2rem;font-weight:bold;margin-bottom:8px}
p{margin-bottom:8px;font-size:1.25rem}
.link{display:block;width:100%;background-color:#2a2a3a;color:white;font-weight:bold;padding:12px;border-radius:20px;text-align:center;transition:background-color 0.3s, transform 0.3s}
.link:hover{background-color:#1f1f29;transform:scale(1.05)}
.ad{border-top:1px solid rgba(255,255,255,0.4);margin-top:24px;padding-top:16px}
.ad-text{font-size:0.875rem;color:rgba(255,255,255,0.6);margin-bottom:8px}
.fade-in{opacity:0;transform:translateY(20px);transition:opacity 0.5s ease,transform 0.5s ease}
.fade-in.show{opacity:1;transform:translateY(0)}
.fade-in:nth-child(1){transition-delay:0.1s}
.fade-in:nth-child(2){transition-delay:0.2s}
.fade-in:nth-child(3){transition-delay:0.3s}
.fade-in:nth-child(4){transition-delay:0.4s}
.fade-in:nth-child(5){transition-delay:0.5s}
.fade-in:nth-child(6){transition-delay:0.6s}
@media (max-width: 768px) {
.container{padding:24px;max-width:300px}
h1{font-size:1.5rem}
.link{padding:8px}
}
</style>
</head>
<body>
<div class="container fade-in">
<h1>notghostxd</h1>
<p id="subtext">Loading...</p>
<p class="fade-in">• My links •</p>
<a href="https://www.youtube.com/@notghostxd" target="_blank" aria-label="YouTube" class="link fade-in">YouTube</a>
<a href="https://discord.com/invite/BjZcmDTAZb" target="_blank" aria-label="Discord Server" class="link fade-in">Discord Server</a>
<a href="https://www.tiktok.com/@notghostxd_yt" target="_blank" aria-label="TikTok" class="link fade-in">TikTok</a>
<a href="https://www.roblox.com/groups/34510534/Ghost-Studios#!/about" target="_blank" aria-label="Roblox Group" class="link fade-in">Roblox Group</a>
<a href="https://www.roblox.com/users/2930656024/profile" target="_blank" aria-label="Roblox Profile" class="link fade-in">Roblox Profile</a>
<div class="ad">
<p class="ad-text fade-in">Advertisement</p>
<a href="https://anoxle.github.io/vulpes/" target="_blank" aria-label="Vulpes - Better Discord-Wide Commands" class="link fade-in">Vulpes - Better Discord-Wide Commands!</a>
</div>
<p class="fade-in" style="font-size:0.875rem;margin-top:16px;">Made by <a href="https://www.youtube.com/@luxpog" target="_blank" aria-label="luxpog YouTube Channel" style="color:white;text-decoration:underline;">luxpog 💖</a></p>
</div>
<script>
async function fetchSubtext() {
try {
const response = await fetch('https://gist.githubusercontent.com/anoxle/1f9b082a57fc0f50a14e6c76510ca418/raw');
if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
const data = await response.json();
if (Array.isArray(data) && data.length > 0 && data[0].subtext_html) {
document.getElementById('subtext').innerHTML = data[0].subtext_html;
} else {
throw new Error('Invalid JSON structure');
}
} catch (error) {
console.error('Error fetching subtext:', error);
document.getElementById('subtext').textContent = 'Error loading subtext';
}
}
window.onload=()=>{document.querySelectorAll('.fade-in').forEach(el=>{el.classList.add('show')});fetchSubtext();}
</script>
</body>
</html>
